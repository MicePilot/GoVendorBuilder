name: 打包 Go 项目依赖 (Vendor Dependencies)

on:
  # 配置为“手动触发”工作流，以便灵活指定目标仓库和版本
  workflow_dispatch:
    inputs:
      repository:
        description: '目标 Go 项目仓库地址 (格式: owner/repo)'
        required: true
        default: '' # 留空则代表处理当前仓库自身
      ref:
        description: '要拉取的分支、标签或提交 SHA'
        required: false
        default: 'main'
      go-version:
        description: |
          要使用的 Go 工具链版本。
          - 示例1（精确版本）: '1.23.0'
          - 示例2（最新稳定版）: 'stable'
          - 示例3（上个稳定版）: 'oldstable'
          - 示例4（语义化范围）: '~1.22.0'
          注意：根据 setup-go 的文档，为免 YAML 解析问题，版本号应使用引号包裹（此处输入字符串即可）。
          如果此项留空，工作流将自动从目标项目的 go.mod 文件中检测所需版本。
        required: false
        default: ''

# 设置工作流运行所需的最小权限
permissions:
  contents: read   # 拉取代码
  packages: write  # 用于上传缓存（如果启用）

jobs:
  vendor:
    name: Vendor Dependencies
    runs-on: ubuntu-latest # 在最新的 Ubuntu 运行器上执行
    steps:
      # 步骤 1: 拉取指定仓库的源代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          # 如果输入了外部仓库地址，则拉取该仓库；否则拉取当前仓库
          repository: ${{ github.event.inputs.repository }}
          ref: ${{ github.event.inputs.ref }}

      # 步骤 2: 设置 Go 开发环境
      - name: 设置 Go
        id: setup-go
        uses: actions/setup-go@v4
        with:
          # 版本解析逻辑（遵循 setup-go 文档定义的优先级）:
          # 1. 如果用户手动输入了 go-version，则优先使用它。
          # 2. 如果用户未输入，则回退到从项目的 go.mod 文件中自动检测。
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ !inputs.go-version && './go.mod' || '' }}
          # 启用依赖缓存，基于 go.mod 文件哈希，可显著加速后续运行
          cache: true

      # 步骤 3: 执行依赖打包命令
      - name: 打包依赖 (go mod vendor)
        run: go mod vendor
        # 此命令会读取 go.mod 和 go.sum，将所有依赖的源代码下载到项目根目录的 ./vendor 文件夹中

      # 步骤 4: (可选) 验证打包结果
      - name: 验证打包结果
        run: |
          echo "✅ 依赖打包完成！"
          echo "使用的 Go 版本: $(go version)"
          echo "Vendor 目录大小:"
          du -sh vendor/
          echo "主要依赖项列表 (前20个):"
          ls vendor/ | head -20

      # 步骤 5: (可选) 将打包好的 vendor 目录上传为工作流制品，可供下载
      - name: 上传 Vendor 目录制品
        if: success() # 仅在之前所有步骤成功时执行
        uses: actions/upload-artifact@v4
        with:
          name: vendored-dependencies-${{ github.run_id }}
          path: vendor/
          retention-days: 7
